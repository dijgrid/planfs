name: PlanFS

on:
  pull_request:
    paths:
      - '.planfs/**'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/planfs.yml'
  push:
    branches:
      - main
    paths:
      - '.planfs/**'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/planfs.yml'

jobs:
  validate:
    name: Validate PlanFS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build workspaces
        run: npm run build --workspaces

      - name: Validate planning artifacts
        run: node src/cli/dist/cli.js validate --format json
